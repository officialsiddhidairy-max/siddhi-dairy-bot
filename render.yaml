services:
  - type: web
    name: siddhi-dairy-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 10000
